<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved) { document.documentElement.setAttribute('data-theme', saved); }
    })();
  </script>
</head>
<body>
  {{ partial "header.html" . }}

  {{ block "main" . }}{{ end }}

  {{ partial "footer.html" . }}
</body>
</html>
