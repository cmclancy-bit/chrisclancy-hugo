<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved) { document.documentElement.setAttribute('data-theme', saved); }
    })();
  </script>
</head>
<body>
  {{ partial "header.html" . }}

  {{ block "main" . }}{{ end }}

  {{ partial "footer.html" . }}

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close image">&#x2715;</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script>
    (function() {
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightbox-img');

      function open(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt || '';
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function close() {
        lightbox.classList.remove('open');
        lightboxImg.src = '';
        document.body.style.overflow = '';
      }

      document.addEventListener('DOMContentLoaded', function() {
        var imgs = document.querySelectorAll('.prose img, .single-hero-img img');
        imgs.forEach(function(img) {
          img.addEventListener('click', function() { open(img.src, img.alt); });
        });
      });

      document.getElementById('lightbox-close').addEventListener('click', close);
      lightbox.addEventListener('click', close);
      lightboxImg.addEventListener('click', function(e) { e.stopPropagation(); });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') close();
      });
    })();
  </script>
</body>
</html>
