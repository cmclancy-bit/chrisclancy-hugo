<header class="site-header">
  <div class="nav-inner">
    <a href="{{ "/" | relURL }}" class="site-name">
      Chris<span>Clancy</span>.com
    </a>
    <nav aria-label="Main navigation">
      <a href="{{ "/" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>Writing</a>
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
