baseURL = 'https://chrisclancy.com/'
languageCode = 'en-us'
title = 'ChrisClancy.com'
theme = 'chrisclancy'

[params]
  tagline    = "Putting words to work"
  description = "Content design, UX, AI, and anything else I can't stop thinking about"
  author     = "Chris Clancy"

[taxonomies]
